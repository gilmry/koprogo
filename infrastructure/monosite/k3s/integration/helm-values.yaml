# Integration environment Helm values
backend:
  image:
    tag: integration-latest
  replicas: 1
  env:
    RUST_LOG: info
    CORS_ALLOWED_ORIGINS: "*"

frontend:
  image:
    tag: integration-latest
  replicas: 1

postgres:
  storage: 5Gi

minio:
  storage: 5Gi

global:
  domain: integration.koprogo.local
  apiDomain: api-integration.koprogo.local
  tls:
    enabled: false

secrets:
  postgresPassword: changeme
  jwtSecret: integration-jwt-secret-minimum-32-chars
  s3AccessKey: koprogo
  s3SecretKey: changeme
