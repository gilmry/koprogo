# Staging environment Helm values
backend:
  image:
    tag: staging-latest
  replicas: 2
  env:
    RUST_LOG: info
    CORS_ALLOWED_ORIGINS: "https://staging.koprogo.be"

frontend:
  image:
    tag: staging-latest
  replicas: 2

postgres:
  storage: 10Gi

minio:
  storage: 10Gi

global:
  domain: staging.koprogo.be
  apiDomain: api-staging.koprogo.be
  tls:
    enabled: true

secrets:
  postgresPassword: changeme
  jwtSecret: staging-jwt-secret-minimum-32-characters
  s3AccessKey: koprogo
  s3SecretKey: changeme
