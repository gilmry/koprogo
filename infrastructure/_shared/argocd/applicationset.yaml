# ApplicationSet 1: Infrastructure (Kustomize)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: koprogo-infra
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - branch: production
            environment: production
            namespace: koprogo-production
            kustomizePath: infrastructure/monosite/k3s/production/kustomize
            autoSync: "true"
            prune: "true"
          - branch: staging
            environment: staging
            namespace: koprogo-staging
            kustomizePath: infrastructure/monosite/k3s/staging/kustomize
            autoSync: "true"
            prune: "true"
          - branch: integration
            environment: integration
            namespace: koprogo-integration
            kustomizePath: infrastructure/monosite/k3s/integration/kustomize
            autoSync: "true"
            prune: "false"
          - branch: dev
            environment: dev
            namespace: koprogo-dev
            kustomizePath: infrastructure/monosite/k3s/dev/kustomize
            autoSync: "false"
            prune: "false"
  template:
    metadata:
      name: "koprogo-infra-{{environment}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: koprogo
        component: infrastructure
        environment: "{{environment}}"
    spec:
      project: koprogo
      source:
        repoURL: https://github.com/gilmry/koprogo.git
        targetRevision: "{{branch}}"
        path: "{{kustomizePath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: "{{prune}}"
          selfHeal: "{{autoSync}}"
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 10
---
# ApplicationSet 2: Application (Helm)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: koprogo-app
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - branch: production
            environment: production
            namespace: koprogo-production
            valuesFile: infrastructure/monosite/k3s/production/helm-values.yaml
            autoSync: "true"
            prune: "true"
          - branch: staging
            environment: staging
            namespace: koprogo-staging
            valuesFile: infrastructure/monosite/k3s/staging/helm-values.yaml
            autoSync: "true"
            prune: "true"
          - branch: integration
            environment: integration
            namespace: koprogo-integration
            valuesFile: infrastructure/monosite/k3s/integration/helm-values.yaml
            autoSync: "true"
            prune: "false"
          - branch: dev
            environment: dev
            namespace: koprogo-dev
            valuesFile: infrastructure/monosite/k3s/dev/helm-values.yaml
            autoSync: "false"
            prune: "false"
  template:
    metadata:
      name: "koprogo-app-{{environment}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: koprogo
        component: application
        environment: "{{environment}}"
    spec:
      project: koprogo
      source:
        repoURL: https://github.com/gilmry/koprogo.git
        targetRevision: "{{branch}}"
        path: infrastructure/_shared/helm/koprogo
        helm:
          valueFiles:
            - "$values/{{valuesFile}}"
      sources:
        - repoURL: https://github.com/gilmry/koprogo.git
          targetRevision: "{{branch}}"
          ref: values
        - repoURL: https://github.com/gilmry/koprogo.git
          targetRevision: "{{branch}}"
          path: infrastructure/_shared/helm/koprogo
          helm:
            valueFiles:
              - $values/{{valuesFile}}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: "{{prune}}"
          selfHeal: "{{autoSync}}"
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      revisionHistoryLimit: 10
