---
# KoproGo Ingress with TLS
# Issue #266-#268: K3s + ArgoCD GitOps
# Traefik ingress controller (K3s default) with Let's Encrypt TLS

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: koprogo-ingress
  namespace: koprogo
  annotations:
    # Traefik configuration
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    # Security headers middleware
    traefik.ingress.kubernetes.io/router.middlewares: "koprogo-security-headers@kubernetescrd"
    # HSTS header
    traefik.ingress.kubernetes.io/router.middlewares: "koprogo-hsts@kubernetescrd"
    # Rate limiting
    traefik.ingress.kubernetes.io/router.middlewares: "koprogo-rate-limit@kubernetescrd"
  labels:
    app: koprogo
    component: ingress

spec:
  tls:
  - hosts:
    - app.koprogo.be
    - api.koprogo.be
    secretName: koprogo-tls

  rules:
  # Frontend: app.koprogo.be
  - host: app.koprogo.be
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: koprogo-frontend
            port:
              number: 80

  # Backend API: api.koprogo.be
  - host: api.koprogo.be
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: koprogo-backend
            port:
              number: 80

---
# Security Headers Middleware
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: koprogo-security-headers
  namespace: koprogo

spec:
  headers:
    customResponseHeaders:
      # HSTS: Strict-Transport-Security (1 year)
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      # Content Security Policy
      Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
      # X-Frame-Options: DENY
      X-Frame-Options: "DENY"
      # X-Content-Type-Options
      X-Content-Type-Options: "nosniff"
      # Referrer-Policy
      Referrer-Policy: "strict-origin-when-cross-origin"
      # Permissions-Policy (formerly Feature-Policy)
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"

---
# HSTS Middleware
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: koprogo-hsts
  namespace: koprogo

spec:
  headers:
    customResponseHeaders:
      Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"

---
# Rate Limiting Middleware
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: koprogo-rate-limit
  namespace: koprogo

spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
