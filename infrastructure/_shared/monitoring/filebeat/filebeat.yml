# Filebeat configuration for VPS (Docker Compose)
filebeat.inputs:
  - type: container
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

  - type: log
    paths:
      - '/var/log/koprogo-*.log'
    fields:
      app: koprogo
      type: application

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

processors:
  - decode_json_fields:
      fields: ["message"]
      target: ""
      overwrite_keys: true
      add_error_key: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "koprogo-logs-%{+yyyy.MM.dd}"

setup.kibana:
  host: "http://kibana:5601"

setup.dashboards.enabled: true
setup.template.name: "koprogo-logs"
setup.template.pattern: "koprogo-logs-*"
setup.ilm.enabled: true
setup.ilm.rollover_alias: "koprogo-logs"
setup.ilm.pattern: "{now/d}-000001"
setup.ilm.policy_name: "koprogo-logs-policy"
