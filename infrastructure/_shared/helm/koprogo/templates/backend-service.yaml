apiVersion: v1
kind: Service
metadata:
  name: {{ include "koprogo.fullname" . }}-backend
  labels:
    {{- include "koprogo.labels" . | nindent 4 }}
    {{- include "koprogo.backend.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "koprogo.backend.selectorLabels" . | nindent 4 }}
