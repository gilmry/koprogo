{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "koprogo.fullname" . }}-minio
  labels:
    {{- include "koprogo.labels" . | nindent 4 }}
    app.kubernetes.io/name: koprogo-minio
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
  selector:
    app.kubernetes.io/name: koprogo-minio
{{- end }}
