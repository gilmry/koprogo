{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "koprogo.fullname" . }}-minio
  labels:
    {{- include "koprogo.labels" . | nindent 4 }}
    app.kubernetes.io/name: koprogo-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: koprogo-minio
  template:
    metadata:
      labels:
        {{- include "koprogo.labels" . | nindent 8 }}
        app.kubernetes.io/name: koprogo-minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          command: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "koprogo.fullname" . }}-secrets
                  key: s3-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "koprogo.fullname" . }}-secrets
                  key: s3-secret-key
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: {{ include "koprogo.fullname" . }}-minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "koprogo.fullname" . }}-minio
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.minio.storageClass }}
  storageClassName: {{ .Values.minio.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.minio.storage }}
{{- end }}
