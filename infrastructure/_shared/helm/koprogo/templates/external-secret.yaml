{{- if .Values.vault.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "koprogo.fullname" . }}-secrets
  labels:
    {{- include "koprogo.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "koprogo.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: secret/data/koprogo/{{ .Values.global.environment | default "dev" }}
        property: postgres-password
    - secretKey: jwt-secret
      remoteRef:
        key: secret/data/koprogo/{{ .Values.global.environment | default "dev" }}
        property: jwt-secret
    - secretKey: s3-access-key
      remoteRef:
        key: secret/data/koprogo/{{ .Values.global.environment | default "dev" }}
        property: s3-access-key
    - secretKey: s3-secret-key
      remoteRef:
        key: secret/data/koprogo/{{ .Values.global.environment | default "dev" }}
        property: s3-secret-key
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: koprogo
{{- end }}
