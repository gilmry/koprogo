# Default values for KoproGo Helm chart
# Override per environment via helm-values.yaml

backend:
  image:
    repository: ghcr.io/gilmry/koprogo-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    limits:
      memory: 384Mi
      cpu: 750m
    requests:
      memory: 256Mi
      cpu: 250m
  env:
    RUST_LOG: warn
    RUST_BACKTRACE: "0"
    CORS_ALLOWED_ORIGINS: "*"
    ACTIX_WORKERS: "1"
    DB_POOL_MAX_CONNECTIONS: "8"
    DB_POOL_MIN_CONNECTIONS: "2"
    ENABLE_RATE_LIMITING: "false"
    STORAGE_PROVIDER: s3
    S3_FORCE_PATH_STYLE: "true"
    S3_KEY_PREFIX: documents
  healthCheck:
    path: /api/v1/health
    initialDelaySeconds: 30
    periodSeconds: 30
  serviceAccount:
    create: true
    name: koprogo-backend

frontend:
  image:
    repository: ghcr.io/gilmry/koprogo-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    limits:
      memory: 128Mi
      cpu: 500m
    requests:
      memory: 96Mi
      cpu: 125m
  healthCheck:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  serviceAccount:
    create: true
    name: koprogo-frontend

postgres:
  enabled: true
  usePGO: false
  image: postgres:15-alpine
  port: 5432
  database: koprogo_db
  user: koprogo
  version: 15
  replicas: 1
  storage: 10Gi
  storageClass: ""
  backupStorage: "10Gi"
  # s3Backup:
  #   bucket: koprogo-pg-backups
  #   endpoint: s3.eu-west-0.amazonaws.com
  #   region: eu-west-0
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  config:
    sharedBuffers: 256MB
    effectiveCacheSize: 768MB
    maxConnections: "15"
    maxWalSize: 1GB

vault:
  enabled: false

minio:
  enabled: true
  image: minio/minio:latest
  storage: 20Gi
  storageClass: ""
  bucket: koprogo-documents
  resources:
    limits:
      memory: 256Mi
      cpu: 250m

global:
  domain: koprogo.local
  apiDomain: api.koprogo.local
  tls:
    enabled: false
    certResolver: letsencrypt
  imagePullSecrets: []

secrets:
  postgresPassword: koprogo123
  jwtSecret: changeme-to-32-chars-minimum
  s3AccessKey: koprogo
  s3SecretKey: koprogo123
