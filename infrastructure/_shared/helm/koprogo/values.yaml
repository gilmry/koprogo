# Default values for KoproGo Helm chart
# Override per environment via helm-values.yaml

backend:
  image:
    repository: ghcr.io/gilmry/koprogo-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    limits:
      memory: 384Mi
      cpu: 750m
    requests:
      memory: 256Mi
      cpu: 250m
  env:
    RUST_LOG: warn
    RUST_BACKTRACE: "0"
    CORS_ALLOWED_ORIGINS: "*"
    ACTIX_WORKERS: "1"
    DB_POOL_MAX_CONNECTIONS: "8"
    DB_POOL_MIN_CONNECTIONS: "2"
    ENABLE_RATE_LIMITING: "false"
    STORAGE_PROVIDER: s3
    S3_FORCE_PATH_STYLE: "true"
    S3_KEY_PREFIX: documents
  healthCheck:
    path: /api/v1/health
    initialDelaySeconds: 30
    periodSeconds: 30
  serviceAccount:
    create: true
    name: koprogo-backend

frontend:
  image:
    repository: ghcr.io/gilmry/koprogo-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    limits:
      memory: 128Mi
      cpu: 500m
    requests:
      memory: 96Mi
      cpu: 125m
  healthCheck:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  serviceAccount:
    create: true
    name: koprogo-frontend

postgres:
  enabled: true
  usePGO: false
  image: postgres:15-alpine
  port: 5432
  database: koprogo_db
  user: koprogo
  version: 15
  replicas: 1
  storage: 10Gi
  storageClass: ""
  backupStorage: "10Gi"
  # s3Backup:
  #   bucket: koprogo-pg-backups
  #   endpoint: s3.eu-west-0.amazonaws.com
  #   region: eu-west-0
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m
  config:
    sharedBuffers: 256MB
    effectiveCacheSize: 768MB
    maxConnections: "15"
    maxWalSize: 1GB

vault:
  enabled: false

minio:
  enabled: true
  # Pinned to a specific MinIO release tag (was `:latest` — forbidden by
  # CRITICAL.md). Follow-up: replace tag with digest pin via
  # `docker manifest inspect minio/minio:RELEASE.2025-04-22T17-06-50Z`.
  image: minio/minio:RELEASE.2025-09-07T16-13-09Z
  storage: 20Gi
  storageClass: ""
  bucket: koprogo-documents
  resources:
    limits:
      memory: 256Mi
      cpu: 250m

global:
  domain: koprogo.local
  apiDomain: api.koprogo.local
  tls:
    enabled: false
    certResolver: letsencrypt
    issuer: ""                       # cert-manager Issuer name (set by cluster profile)
  imagePullSecrets: []
  # Cluster-profile-injected fields (PR-A — see infrastructure/_shared/cluster-profiles/README.md)
  # When set, these override component-level equivalents (postgres.storageClass, minio.storageClass).
  # Empty default = backward compat (templates fall back to component-level values).
  storageClassName: ""               # hostpath | local-path | csi-cinder-high-speed | gp2 | ...
  ingressClassName: ""               # nginx | traefik | alb | ...
  domainOverride: ""                 # if set, replaces .domain / .apiDomain in cluster-profile context
  secretsBackend: raw                # raw | sealed-secrets | external-secrets-vault
  vaultRole: ""                      # only used when secretsBackend = external-secrets-vault

# Cluster profile resources preset (advisory — actual resources still set per-component)
# Used by cluster profiles to communicate intended sizing to operators.
# small  = sandbox / Docker Desktop (256Mi/500m typical limits)
# medium = single-VPS k3s self-host (512Mi/750m typical limits)
# large  = managed K8s production (1Gi+/1+CPU typical limits)
resources:
  preset: medium

secrets:
  postgresPassword: koprogo123
  jwtSecret: changeme-to-32-chars-minimum
  s3AccessKey: koprogo
  s3SecretKey: koprogo123
