# KoproGo Monitoring Stack - Default Values

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      resources:
        limits:
          memory: 512Mi
          cpu: 500m
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  grafana:
    adminPassword: changeme
    resources:
      limits:
        memory: 256Mi
        cpu: 250m
    additionalDataSources:
      - name: Elasticsearch
        type: elasticsearch
        url: http://elasticsearch-master:9200
        database: "filebeat-*"
        jsonData:
          timeField: "@timestamp"
          esVersion: "8.0.0"
    persistence:
      enabled: true
      size: 5Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        limits:
          memory: 64Mi
          cpu: 100m
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'default'
      receivers:
        - name: 'default'

elasticsearch:
  replicas: 1
  minimumMasterNodes: 1
  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 512Mi
      cpu: 100m
  esJavaOpts: "-Xmx512m -Xms512m"
  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 30Gi
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.security.enrollment.enabled: false

kibana:
  resources:
    limits:
      memory: 512Mi
      cpu: 250m
    requests:
      memory: 256Mi
      cpu: 100m
  kibanaConfig:
    kibana.yml: |
      server.host: "0.0.0.0"
      elasticsearch.hosts: ["http://elasticsearch-master:9200"]

filebeat:
  filebeatConfig:
    filebeat.yml: |
      filebeat.autodiscover:
        providers:
          - type: kubernetes
            node: ${NODE_NAME}
            hints.enabled: true
            hints.default_config:
              type: container
              paths:
                - /var/log/containers/*${data.kubernetes.container.id}.log

      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
              - logs_path:
                  logs_path: "/var/log/containers/"

      output.elasticsearch:
        host: '${NODE_NAME}'
        hosts: '["http://elasticsearch-master:9200"]'
        index: "filebeat-%{[agent.version]}-%{+yyyy.MM.dd}"

      setup.kibana:
        host: "http://kibana-kibana:5601"

      setup.dashboards.enabled: true
      setup.template.enabled: true
  resources:
    limits:
      memory: 200Mi
      cpu: 100m
    requests:
      memory: 100Mi
      cpu: 50m
