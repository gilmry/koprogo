# SOPS configuration for KoproGo secrets
# Usage: sops --encrypt <file>
creation_rules:
  # VPS .env files
  - path_regex: \.env\.enc$
    age: >-
      age1placeholder_replace_with_your_public_key
  # Helm secrets
  - path_regex: helm-secrets\.yaml$
    age: >-
      age1placeholder_replace_with_your_public_key
  # Ansible vault (use ansible-vault instead)
  - path_regex: vault\.yml$
    age: >-
      age1placeholder_replace_with_your_public_key
