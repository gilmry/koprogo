---
# Ansible Playbook: K3s Installation + Hardening
# Issue #267: K3s with Ansible (installation + hardening)
# Belgian GDPR compliance, production-grade security

- name: "K3s Master Node Installation"
  hosts: k3s_master
  become: true
  gather_facts: true

  vars:
    k3s_version: "v1.29.2+k3s1"
    k3s_install_script_url: "https://get.k3s.io"
    # VAULT: K3S_TOKEN - use: ansible-vault edit group_vars/k3s_master/vault.yml
    k3s_token: "{{ vault_k3s_token }}"
    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"

  pre_tasks:
  - name: "Validate prerequisites"
    assert:
      that:
      - ansible_os_family == "Debian"
      - ansible_distribution_version is version('20.04', '>=')
      fail_msg: "Requires Ubuntu 20.04+ (Debian family)"

  - name: "System information"
    debug:
      msg: |
        K3s Master Node Installation
        ===================================
        Hostname: {{ ansible_hostname }}
        IP Address: {{ ansible_default_ipv4.address }}
        K3s Version: {{ k3s_version }}
        OS: {{ ansible_distribution }} {{ ansible_distribution_version }}

  tasks:
  - name: "Update system packages"
    apt:
      update_cache: true
      cache_valid_time: 3600

  - name: "Install required system packages"
    apt:
      name:
      - curl
      - wget
      - git
      - vim
      - htop
      - net-tools
      - jq
      - unzip
      state: present

  - name: "Kernel hardening - sysctl security settings"
    sysctl:
      name: "{{ item.name }}"
      value: "{{ item.value }}"
      sysctl_set: true
      state: present
      reload: true
    loop:
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "kernel.unprivileged_userns_clone", value: "0" }
    - { name: "kernel.kptr_restrict", value: "2" }
    - { name: "kernel.sysrq", value: "0" }

  - name: "Install K3s server"
    shell: |
      curl -sfL {{ k3s_install_script_url }} | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        K3S_TOKEN="{{ k3s_token }}" \
        INSTALL_K3S_EXEC="server \
          --tls-san={{ ansible_default_ipv4.address }} \
          --tls-san={{ inventory_hostname }} \
          --disable traefik \
          --disable servicelb \
          --disable local-storage \
          --write-kubeconfig-mode=600 \
          --kube-apiserver-arg='audit-log-path=/var/log/k3s-audit.log' \
          --kube-apiserver-arg='audit-log-maxage=7' \
          --kube-apiserver-arg='audit-policy-file=/var/lib/rancher/k3s/server/audit-policy.json' \
          --kubelet-arg='read-only-port=0' \
          --kubelet-arg='event-record-qps=1'" \
        sh -
    args:
      creates: /usr/local/bin/k3s
    environment:
      KUBECONFIG: "{{ kubeconfig_path }}"
    register: k3s_install_result
    retries: 3
    delay: 10

  - name: "Wait for K3s API server to be ready"
    wait_for:
      path: "{{ kubeconfig_path }}"
      timeout: 300
      delay: 10
    register: wait_result

  - name: "Wait for K3s node token to be available"
    wait_for:
      path: /var/lib/rancher/k3s/server/node-token
      timeout: 300
      delay: 10

  - name: "Retrieve K3s node token"
    slurp:
      src: /var/lib/rancher/k3s/server/node-token
    register: k3s_node_token

  - name: "Set kubeconfig permissions"
    file:
      path: "{{ kubeconfig_path }}"
      mode: "0600"
      owner: root
      group: root

  - name: "Create kubectl symlink"
    file:
      src: /usr/local/bin/k3s
      dest: /usr/local/bin/kubectl
      state: link

  - name: "Verify K3s installation"
    shell: /usr/local/bin/k3s --version
    register: k3s_version_check
    changed_when: false

  - name: "Display K3s version"
    debug:
      var: k3s_version_check.stdout

  - name: "Wait for K3s node to be Ready"
    shell: |
      kubectl get node {{ inventory_hostname }} \
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
        2>/dev/null | grep -q "True"
    register: node_ready
    until: node_ready is succeeded
    retries: 30
    delay: 10
    changed_when: false
    environment:
      KUBECONFIG: "{{ kubeconfig_path }}"

  - name: "Display K3s nodes"
    shell: kubectl get nodes -o wide
    environment:
      KUBECONFIG: "{{ kubeconfig_path }}"
    changed_when: false
    register: nodes_output

  - name: "Nodes status"
    debug:
      var: nodes_output.stdout

  - name: "Create koprogo namespace"
    kubernetes.core.k8s:
      name: koprogo
      api_version: v1
      kind: Namespace
      state: present
      kubeconfig: "{{ kubeconfig_path }}"

  - name: "Create GitHub Container Registry secret"
    kubernetes.core.k8s:
      state: present
      kubeconfig: "{{ kubeconfig_path }}"
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ghcr-secret
          namespace: koprogo
        type: kubernetes.io/dockercfg
        data:
          .dockercfg: "{{ vault_ghcr_dockercfg | b64encode }}"

  post_tasks:
  - name: "K3s installation summary"
    debug:
      msg: |
        K3s Master Installation Complete
        ===================================
        Master Node: {{ inventory_hostname }}
        IP Address: {{ ansible_default_ipv4.address }}
        K3s Version: {{ k3s_version_check.stdout }}
        Kubeconfig: {{ kubeconfig_path }}
        Node Token: Stored in /var/lib/rancher/k3s/server/node-token

        To use kubectl:
          export KUBECONFIG={{ kubeconfig_path }}
          kubectl get nodes

---
# Ansible Playbook: K3s Agent Node Installation
# Issue #267: K3s agent nodes (workers)

- name: "K3s Agent Node Installation"
  hosts: k3s_agents
  become: true
  gather_facts: true

  vars:
    k3s_version: "v1.29.2+k3s1"
    k3s_install_script_url: "https://get.k3s.io"
    k3s_token: "{{ vault_k3s_token }}"
    k3s_master_url: "https://{{ hostvars[groups['k3s_master'][0]]['ansible_default_ipv4']['address'] }}:6443"

  pre_tasks:
  - name: "Validate prerequisites"
    assert:
      that:
      - ansible_os_family == "Debian"
      - ansible_distribution_version is version('20.04', '>=')
      fail_msg: "Requires Ubuntu 20.04+ (Debian family)"

  - name: "System information"
    debug:
      msg: |
        K3s Agent Node Installation
        ===================================
        Hostname: {{ ansible_hostname }}
        IP Address: {{ ansible_default_ipv4.address }}
        K3s Version: {{ k3s_version }}
        Master URL: {{ k3s_master_url }}

  tasks:
  - name: "Update system packages"
    apt:
      update_cache: true
      cache_valid_time: 3600

  - name: "Install required system packages"
    apt:
      name:
      - curl
      - wget
      - git
      - vim
      - htop
      - net-tools
      state: present

  - name: "Kernel hardening - sysctl security settings"
    sysctl:
      name: "{{ item.name }}"
      value: "{{ item.value }}"
      sysctl_set: true
      state: present
      reload: true
    loop:
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "kernel.unprivileged_userns_clone", value: "0" }

  - name: "Install K3s agent"
    shell: |
      curl -sfL {{ k3s_install_script_url }} | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        K3S_URL="{{ k3s_master_url }}" \
        K3S_TOKEN="{{ k3s_token }}" \
        INSTALL_K3S_EXEC="agent \
          --kubelet-arg='read-only-port=0' \
          --kubelet-arg='event-record-qps=1'" \
        sh -
    args:
      creates: /usr/local/bin/k3s-agent
    register: k3s_install_result
    retries: 3
    delay: 10

  - name: "Wait for K3s service to be active"
    systemd:
      name: k3s-agent
      state: started
      enabled: true

  - name: "Verify K3s agent installation"
    shell: /usr/local/bin/k3s --version
    register: k3s_version_check
    changed_when: false

  - name: "Display K3s agent version"
    debug:
      var: k3s_version_check.stdout

  post_tasks:
  - name: "K3s agent installation summary"
    debug:
      msg: |
        K3s Agent Installation Complete
        ===================================
        Agent Node: {{ inventory_hostname }}
        IP Address: {{ ansible_default_ipv4.address }}
        K3s Version: {{ k3s_version_check.stdout }}
        Master URL: {{ k3s_master_url }}
