# Ansible Inventory for K3s Cluster
# Issue #267: K3s with Ansible (installation + hardening)
# Generated from Terraform output or manually configured

[k3s_master]
koprogo-master ansible_host=10.0.0.10 ansible_user=ubuntu

[k3s_agents]
koprogo-agent-1 ansible_host=10.0.0.11 ansible_user=ubuntu
koprogo-agent-2 ansible_host=10.0.0.12 ansible_user=ubuntu

[k3s_cluster:children]
k3s_master
k3s_agents

[k3s_cluster:vars]
# SSH configuration
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_extra_args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

# K3s configuration
k3s_version=v1.29.2+k3s1
k3s_cluster_name=koprogo
k3s_token={{ vault_k3s_token }}

# Python interpreter
ansible_python_interpreter=/usr/bin/python3

# Privilege escalation
become=true
become_method=sudo
become_user=root
