---
# ArgoCD Application for KoproGo Production
# Issue #268: GitOps pipeline with ArgoCD on K3s
# Belgian GDPR compliance: Continuous deployment from Git

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: koprogo
  namespace: argocd
  # Finalizer ensures proper cleanup of resources
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: koprogo
    app.kubernetes.io/part-of: argocd

spec:
  # Project configuration
  project: default

  # Source repository (Git)
  source:
    repoURL: https://github.com/gilmry/koprogo.git
    targetRevision: main
    path: k8s
    # Kustomize configuration
    kustomize:
      version: v5.0.0
      images:
      - ghcr.io/gilmry/koprogo-backend:latest
      - ghcr.io/gilmry/koprogo-frontend:latest

  # Destination cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: koprogo

  # Sync Policy: GitOps automation
  syncPolicy:
    # Automatic synchronization enabled
    automated:
      # Delete resources that are no longer in Git
      prune: true
      # Force sync if cluster state differs from Git
      selfHeal: true
      # Never sync if target is empty (safety)
      allowEmpty: false

    # Sync options
    syncOptions:
    # Create namespace if missing
    - CreateNamespace=true
    # Delete resources in foreground order
    - PrunePropagationPolicy=foreground
    # Prune last (wait for other resources to delete first)
    - PruneLast=true
    # RespectIgnoreDifferences: respect ignoreDifferences list
    - RespectIgnoreDifferences=true

    # Retry policy for failed syncs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health assessment and ignoreDifferences
  ignoreDifferences:
  # Ignore replicas changes in Deployments (HPA controlled)
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

  # Notification preferences
  info:
  - name: "Documentation"
    value: "https://github.com/gilmry/koprogo/blob/main/docs/K3S_GITOPS.md"
  - name: "Issue #266"
    value: "K3s Provisioning with Terraform + OpenStack"
  - name: "Issue #267"
    value: "K3s with Ansible (installation + hardening)"
  - name: "Issue #268"
    value: "GitOps pipeline with ArgoCD on K3s"

  # Revision history
  revisionHistoryLimit: 10
