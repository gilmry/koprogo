# Cargo Audit Configuration
# This file configures which security advisories to ignore in CI/CD

[advisories]
# List of advisory IDs to ignore
ignore = [
    # RUSTSEC-2023-0071: rsa 0.9.8 - Marvin Attack
    # Status: Accepted Risk (Low Impact)
    # Reason: Used by sqlx-mysql which is not enabled (we use PostgreSQL only)
    # Impact: None in production environment
    # Mitigation: Monitor for sqlx updates
    # See: SECURITY.md for full assessment
    "RUSTSEC-2023-0071",

    # RUSTSEC-2025-0111: tokio-tar 0.3.1 - PAX Headers Parsing
    # Status: Accepted Risk (Test Only)
    # Reason: Used only by testcontainers in test environment
    # Impact: Test environment only, never in production
    # Mitigation: Monitor for testcontainers updates
    # See: SECURITY.md for full assessment
    "RUSTSEC-2025-0111",

    # RUSTSEC-2025-0134: rustls-pemfile 2.2.0 - unmaintained
    # Status: Accepted Risk (Test Only)
    # Reason: Pulled by testcontainers/bollard for test infrastructure. No production code path.
    # Mitigation: Monitor testcontainers for migration to a maintained alternative.
    "RUSTSEC-2025-0134",

    # rustls-webpki 0.101.7 family — all from the AWS SDK transitive chain
    # (aws-config → aws-smithy-http-client 1.1.12 → hyper-rustls 0.24.2 → rustls 0.21
    #  → rustls-webpki 0.101.7). aws-smithy-http-client 1.1.12 is the LATEST release;
    # there is no upgrade path until upstream drops legacy rustls 0.21. No 0.101.x patch
    # exists (fixes require >=0.103.x, semver-incompatible).
    # Impact: Low — AWS SDK TLS does not exercise these code paths in practice
    # (OCSP stapling instead of CRL; no wildcard/URI constraint cases in AWS PKI).
    # Mitigation: Track aws-smithy-http-client releases; bump as soon as legacy
    # rustls is dropped.
    "RUSTSEC-2026-0049",  # CRL Distribution Point matching
    "RUSTSEC-2026-0098",  # cert URI names constraint
    "RUSTSEC-2026-0099",  # cert wildcard name constraint
    "RUSTSEC-2026-0104",  # reachable panic in CRL parsing

    # RUSTSEC-2026-0002: lru 0.12.5 - IterMut violates Stacked Borrows (unsound)
    # Status: Accepted Risk (Transitive / No Direct Usage)
    # Reason: Transitive of aws-sdk-s3 (latest); no newer 0.12.x. koprogo never calls
    #         lru directly; used internally by aws-sdk-s3 for connection pooling.
    # Impact: Theoretical soundness; no known exploit through aws-sdk-s3 usage.
    # Mitigation: Monitor aws-sdk-s3 for update to lru 0.13+.
    "RUSTSEC-2026-0002",

    # astral-tokio-tar 0.6.0 — both advisories from testcontainers dev-dependency only
    # Status: Accepted Risk (Test Only)
    # Reason: testcontainers 0.27.x pulls 0.6.0; fix would require testcontainers > 0.27.2.
    # Mitigation: Bump testcontainers when next minor is available.
    "RUSTSEC-2026-0112",  # PAX header desynchronization
    "RUSTSEC-2026-0113",  # `unpack_in` chmod via symlinks
]

# Optionally set a threshold for advisory severity
# Advisories with a severity below this will be ignored
# Options: "none", "low", "medium", "high", "critical"
# severity_threshold = "medium"
