paths:
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Login and obtain JWT tokens
      description: 'Authenticate with email and password to obtain JWT access and refresh tokens.

        Returns user roles and active role.

        '
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/switch-role:
    post:
      tags:
      - Authentication
      summary: Switch active user role
      description: 'Switch between different roles (e.g., Owner → BoardMember).

        All subsequent requests will use the new active role.

        '
      operationId: switchRole
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchRoleRequest'
      responses:
        '200':
          description: Role switched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Role switched successfully
                  active_role:
                    $ref: '#/components/schemas/UserRole'
        '400':
          description: Invalid role ID or unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/me:
    get:
      tags:
      - Authentication
      summary: Get current user profile
      description: Returns authenticated user information with roles and active role
      operationId: getCurrentUser
      security:
      - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                  name:
                    type: string
                  roles:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserRole'
                  active_role:
                    type: string
                    format: uuid
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /buildings:
    get:
      tags:
      - Buildings
      summary: List all buildings
      description: Returns a list of all buildings accessible to the current user
      operationId: listBuildings
      security:
      - BearerAuth: []
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
      responses:
        '200':
          description: Buildings retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Building'
    post:
      tags:
      - Buildings
      summary: Create a new building
      description: Create a new building (requires Syndic or SuperAdmin role)
      operationId: createBuilding
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingRequest'
      responses:
        '201':
          description: Building created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
  /buildings/{id}:
    get:
      tags:
      - Buildings
      summary: Get building by ID
      operationId: getBuildingById
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Building retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          description: Building not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
      - Buildings
      summary: Update building
      operationId: updateBuilding
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingRequest'
      responses:
        '200':
          description: Building updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          description: Building not found
    delete:
      tags:
      - Buildings
      summary: Delete building
      operationId: deleteBuilding
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Building deleted successfully
        '404':
          description: Building not found
  /units:
    get:
      tags:
      - Units
      summary: List all units
      operationId: listUnits
      security:
      - BearerAuth: []
      parameters:
      - name: building_id
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by building ID
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Units retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Unit'
    post:
      tags:
      - Units
      summary: Create a new unit
      operationId: createUnit
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitRequest'
      responses:
        '201':
          description: Unit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
  /units/{id}:
    get:
      tags:
      - Units
      summary: Get unit by ID
      operationId: getUnitById
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Unit retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Unit'
        '404':
          description: Unit not found
  /buildings/{id}/units:
    get:
      tags:
      - Units
      summary: Get all units in a building
      operationId: getUnitsByBuilding
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Units retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Unit'
  /units/{unit_id}/owners:
    get:
      tags:
      - Unit Owners
      summary: Get active owners of a unit
      description: Returns all active owners (end_date is null) of a specific unit
      operationId: getUnitOwners
      security:
      - BearerAuth: []
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Owners retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitOwner'
    post:
      tags:
      - Unit Owners
      summary: Add owner to unit
      description: 'Add an owner to a unit with ownership percentage.

        Validates that total ownership percentage ≤ 100%.

        '
      operationId: addOwnerToUnit
      security:
      - BearerAuth: []
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOwnerToUnitRequest'
      responses:
        '201':
          description: Owner added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitOwner'
        '400':
          description: Invalid input or total ownership > 100%
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
                example:
                  error: Total ownership percentage would exceed 100%
                  code: OWNERSHIP_LIMIT_EXCEEDED
  /units/{unit_id}/owners/history:
    get:
      tags:
      - Unit Owners
      summary: Get ownership history of a unit
      description: Returns all owners (active and past) of a unit
      operationId: getUnitOwnershipHistory
      security:
      - BearerAuth: []
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Ownership history retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnitOwner'
  /units/{unit_id}/owners/total-percentage:
    get:
      tags:
      - Unit Owners
      summary: Get total ownership percentage of a unit
      description: Returns the sum of all active ownership percentages (should be ≤ 1.0)
      operationId: getTotalOwnershipPercentage
      security:
      - BearerAuth: []
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Total percentage calculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  unit_id:
                    type: string
                    format: uuid
                  total_percentage:
                    type: number
                    format: double
                    example: 1.0
  /units/{unit_id}/owners/{owner_id}:
    delete:
      tags:
      - Unit Owners
      summary: Remove owner from unit
      description: Ends the ownership relationship by setting end_date to current timestamp
      operationId: removeOwnerFromUnit
      security:
      - BearerAuth: []
      parameters:
      - name: unit_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: owner_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Owner removed successfully
        '404':
          description: Ownership relationship not found
  /unit-owners/{relationship_id}:
    put:
      tags:
      - Unit Owners
      summary: Update ownership relationship
      description: Update ownership percentage or set primary contact
      operationId: updateUnitOwner
      security:
      - BearerAuth: []
      parameters:
      - name: relationship_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownership_percentage:
                  type: number
                  format: double
                  minimum: 0
                  maximum: 1
                is_primary_contact:
                  type: boolean
      responses:
        '200':
          description: Ownership updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitOwner'
