      summary: Créer un ticket de maintenance
      description: 'Crée une demande de maintenance. La date d''échéance est calculée

        automatiquement selon la priorité (Critical: 1h, Urgent: 4h, High: 24h,

        Medium: 3j, Low: 7j).

        '
