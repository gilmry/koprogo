        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Tentative d'export des données d'un autre utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Utilisateur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Utilisateur déjà anonymisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /gdpr/erase:
    delete:
      tags:
      - GDPR
      summary: Effacer les données personnelles (Article 17 — Droit à l'effacement)
      description: 'Anonymise le compte utilisateur et tous les profils propriétaire liés.

        Les données ne sont pas supprimées entièrement pour préserver l''intégrité

        référentielle et respecter les obligations légales de conservation (7 ans pour

        les données financières belges).

        '
      operationId: eraseUserData
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Données anonymisées avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GdprEraseResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Tentative d'effacement des données d'un autre utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Utilisateur non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Obligations légales empêchent l'effacement (dépenses impayées)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '410':
          description: Utilisateur déjà anonymisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur interne
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
