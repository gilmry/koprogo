components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT token obtained from `/auth/login` endpoint.

        Include in header: `Authorization: Bearer <token>`

        '
  schemas:
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: syndic@example.com
        password:
          type: string
          format: password
          example: secure_password_123
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token expiration in seconds
          example: 3600
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        active_role:
          type: string
          format: uuid
    UserRole:
      type: object
      properties:
        role_id:
          type: string
          format: uuid
        role_type:
          type: string
          enum:
          - Owner
          - Syndic
          - Accountant
          - BoardMember
          - SuperAdmin
        organization_id:
          type: string
          format: uuid
        organization_name:
          type: string
    SwitchRoleRequest:
      type: object
      required:
      - role_id
      properties:
        role_id:
          type: string
          format: uuid
    Building:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Résidence Les Érables
        address:
          type: string
          example: 123 Avenue de Tervuren, 1040 Bruxelles
        total_units:
          type: integer
          minimum: 1
          example: 24
        construction_year:
          type: integer
          minimum: 1800
          maximum: 2100
          example: 1985
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateBuildingRequest:
      type: object
      required:
      - name
      - address
      - total_units
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        address:
          type: string
          minLength: 1
          maxLength: 500
        total_units:
          type: integer
          minimum: 1
        construction_year:
          type: integer
          minimum: 1800
          maximum: 2100
    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        building_id:
          type: string
          format: uuid
        unit_number:
          type: string
          example: 2B
        floor:
          type: integer
          example: 2
        area:
          type: number
          format: double
          description: Area in square meters
          example: 85.5
        type:
          type: string
          enum:
          - Apartment
          - Commercial
          - Parking
          - Storage
          - Other
          example: Apartment
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateUnitRequest:
      type: object
      required:
      - building_id
      - unit_number
      properties:
        building_id:
          type: string
          format: uuid
        unit_number:
          type: string
          minLength: 1
        floor:
          type: integer
        area:
          type: number
          format: double
          minimum: 0
        type:
          type: string
          enum:
          - Apartment
          - Commercial
          - Parking
          - Storage
          - Other
    Owner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Jean Dupont
        email:
          type: string
          format: email
          example: jean.dupont@example.com
        phone:
          type: string
          example: +32 2 123 45 67
        address:
          type: string
          example: 123 Avenue de Tervuren, 1040 Bruxelles
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateOwnerRequest:
      type: object
      required:
      - name
      - email
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
    UnitOwner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        unit_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        ownership_percentage:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Ownership percentage (0.0 to 1.0)
          example: 0.5
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
          nullable: true
        is_primary_contact:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AddOwnerToUnitRequest:
      type: object
      required:
      - owner_id
      - ownership_percentage
      properties:
        owner_id:
          type: string
          format: uuid
        ownership_percentage:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.5
        is_primary_contact:
          type: boolean
          default: false
    TransferOwnershipRequest:
      type: object
      required:
      - from_owner_id
      - to_owner_id
      properties:
        from_owner_id:
          type: string
          format: uuid
        to_owner_id:
          type: string
          format: uuid
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        building_id:
          type: string
          format: uuid
        description:
          type: string
          example: Réparation ascenseur - Maintenance annuelle
        amount:
          type: number
          format: double
          example: 1250.0
        expense_date:
          type: string
          format: date
          example: '2025-11-10'
        category:
          type: string
          enum:
          - Maintenance
          - Utilities
          - Insurance
          - ManagementFees
          - Repairs
          - Improvements
          - Legal
          - Other
          example: Maintenance
        status:
          type: string
          enum:
          - Draft
          - PendingApproval
          - Approved
          - Rejected
          - Paid
          example: Approved
        rejection_reason:
          type: string
          nullable: true
        paid:
          type: boolean
          default: false
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InvoiceLineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
          example: Main d'œuvre technicien
        quantity:
          type: number
          format: double
          example: 4.0
        unit_price:
          type: number
          format: double
          example: 75.0
        vat_rate:
          type: number
          format: double
          enum:
          - 0.06
          - 0.12
          - 0.21
          description: Belgian VAT rates (6%, 12%, 21%)
          example: 0.21
        total_excl_vat:
          type: number
          format: double
          example: 300.0
        vat_amount:
          type: number
          format: double
          example: 63.0
        total_incl_vat:
          type: number
          format: double
          example: 363.0
    CreateExpenseRequest:
      type: object
      required:
      - building_id
      - description
      - amount
      - expense_date
      - category
      properties:
        building_id:
          type: string
          format: uuid
        description:
          type: string
        amount:
          type: number
          format: double
          minimum: 0
        expense_date:
          type: string
          format: date
        category:
          type: string
          enum:
          - Maintenance
          - Utilities
          - Insurance
          - ManagementFees
          - Repairs
          - Improvements
          - Legal
          - Other
        status:
          type: string
          enum:
          - Draft
          - PendingApproval
          - Approved
          - Rejected
          default: Draft
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: '451000'
          description: PCMN account code
        name:
          type: string
          example: TVA à récupérer
        account_type:
          type: string
          enum:
          - Asset
          - Liability
          - Equity
          - Income
          - Expense
          - OffBalance
          example: Asset
        parent_code:
          type: string
          nullable: true
          example: '45'
        organization_id:
          type: string
          format: uuid
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
    CreateAccountRequest:
      type: object
      required:
      - code
      - name
      - account_type
      properties:
        code:
          type: string
          pattern: ^\d{2,6}$
        name:
          type: string
        account_type:
          type: string
          enum:
          - Asset
          - Liability
          - Equity
          - Income
          - Expense
          - OffBalance
        parent_code:
          type: string
          nullable: true
    BalanceSheet:
      type: object
      properties:
        period:
          type: string
          example: '2025'
        assets:
          type: object
          properties:
            fixed_assets:
              type: object
              properties:
                buildings:
                  type: number
                  format: double
                equipment:
                  type: number
                  format: double
                total:
                  type: number
                  format: double
            current_assets:
              type: object
              properties:
                receivables:
                  type: number
                  format: double
                bank:
                  type: number
                  format: double
                cash:
                  type: number
                  format: double
                total:
                  type: number
                  format: double
            total_assets:
              type: number
              format: double
        liabilities:
          type: object
          properties:
            equity:
              type: object
            long_term_liabilities:
              type: object
            current_liabilities:
              type: object
            total_liabilities:
              type: number
              format: double
        balance_check:
          type: object
          properties:
            assets:
              type: number
              format: double
            liabilities:
              type: number
              format: double
            difference:
              type: number
              format: double
            balanced:
              type: boolean
    IncomeStatement:
      type: object
      properties:
        period:
          type: string
          example: 2025-Q4
        income:
          type: object
          properties:
            rental_charges:
              type: number
              format: double
            other_income:
              type: number
              format: double
            total_income:
              type: number
              format: double
        expenses:
          type: object
          properties:
            property_expenses:
              type: number
              format: double
            utilities:
              type: number
              format: double
            maintenance:
              type: number
              format: double
            management_fees:
              type: number
              format: double
            insurance:
              type: number
              format: double
            other_expenses:
              type: number
              format: double
            total_expenses:
              type: number
              format: double
        operating_result:
          type: number
          format: double
        financial_result:
          type: number
          format: double
        net_result:
          type: number
          format: double
    PaymentReminder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        reminder_level:
          type: string
          enum:
          - Gentle
          - Formal
          - FinalNotice
          - LegalAction
          description: '- Gentle: D+15, friendly reminder

            - Formal: D+30, formal notice

            - FinalNotice: D+45, final warning with penalties

            - LegalAction: D+60, legal proceedings

            '
          example: Gentle
        message:
          type: string
        sent_date:
          type: string
          format: date-time
          nullable: true
        tracking_number:
          type: string
          nullable: true
        late_payment_penalty:
          type: number
          format: double
          description: Calculated Belgian late payment penalty (8% annual)
          example: 13.15
        notes:
          type: string
        created_at:
          type: string
          format: date-time
    CreatePaymentReminderRequest:
      type: object
      required:
      - expense_id
      - owner_id
      - reminder_level
      properties:
        expense_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        reminder_level:
          type: string
          enum:
          - Gentle
          - Formal
          - FinalNotice
          - LegalAction
        message:
          type: string
    Meeting:
      type: object
      properties:
        id:
          type: string
          format: uuid
        building_id:
          type: string
          format: uuid
        meeting_type:
          type: string
          enum:
          - GeneralAssembly
          - BoardMeeting
          - ExtraordinaryAssembly
          example: GeneralAssembly
        scheduled_date:
          type: string
          format: date-time
        location:
          type: string
          example: Salle communautaire - Rez-de-chaussée
        agenda:
          type: string
        minutes:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - Scheduled
          - Completed
          - Cancelled
          default: Scheduled
        created_at:
          type: string
          format: date-time
    CreateMeetingRequest:
      type: object
      required:
      - building_id
      - meeting_type
      - scheduled_date
      properties:
        building_id:
          type: string
          format: uuid
        meeting_type:
          type: string
          enum:
          - GeneralAssembly
          - BoardMeeting
          - ExtraordinaryAssembly
        scheduled_date:
          type: string
          format: date-time
        location:
          type: string
        agenda:
          type: string
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Convocation AG - 15 décembre 2025
        document_type:
          type: string
          enum:
          - Invoice
          - Contract
          - MeetingInvitation
          - MeetingMinutes
          - InsurancePolicy
          - MaintenanceReport
          - FinancialReport
          - Other
          example: MeetingInvitation
        file_path:
          type: string
          example: /uploads/convocation-ag-2025-12.pdf
        building_id:
          type: string
          format: uuid
          nullable: true
        expense_id:
          type: string
          format: uuid
          nullable: true
        meeting_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
    CreateDocumentRequest:
      type: object
      required:
      - title
      - document_type
      - file_path
      properties:
        title:
          type: string
        document_type:
          type: string
          enum:
          - Invoice
          - Contract
          - MeetingInvitation
          - MeetingMinutes
          - InsurancePolicy
          - MaintenanceReport
          - FinancialReport
          - Other
        file_path:
          type: string
        building_id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
        meeting_id:
          type: string
          format: uuid
    Error:
      type: object
      properties:
        error:
          type: string
          example: Resource not found
        code:
          type: string
          example: NOT_FOUND
        details:
          type: object
    HealthCheck:
      type: object
      properties:
        status:
          type: string
          example: healthy
        version:
          type: string
          example: 1.0.0
        database:
          type: string
          example: connected
        uptime_seconds:
          type: integer
          example: 86400
    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        building_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        expense_id:
          type: string
          format: uuid
          nullable: true
        amount_cents:
          type: integer
          format: int64
          description: Montant en centimes EUR
        currency:
          type: string
          example: EUR
        status:
          type: string
          enum:
          - Pending
          - Processing
          - RequiresAction
          - Succeeded
          - Failed
          - Cancelled
          - Refunded
        payment_method_type:
          type: string
          enum:
          - Card
          - SepaDebit
          - BankTransfer
          - Cash
        stripe_payment_intent_id:
          type: string
          nullable: true
        stripe_customer_id:
          type: string
          nullable: true
        payment_method_id:
          type: string
          format: uuid
          nullable: true
        idempotency_key:
          type: string
        description:
          type: string
          nullable: true
        metadata:
          type: string
          nullable: true
        failure_reason:
          type: string
          nullable: true
        refunded_amount_cents:
          type: integer
          format: int64
        net_amount_cents:
          type: integer
          format: int64
          description: amount_cents - refunded_amount_cents
        succeeded_at:
          type: string
          format: date-time
          nullable: true
        failed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaymentStatsResponse:
      type: object
      properties:
        total_count:
          type: integer
          format: int64
        succeeded_count:
          type: integer
          format: int64
        failed_count:
          type: integer
          format: int64
        pending_count:
          type: integer
          format: int64
        total_amount_cents:
          type: integer
          format: int64
        total_succeeded_cents:
          type: integer
          format: int64
        total_refunded_cents:
          type: integer
          format: int64
        net_amount_cents:
          type: integer
          format: int64
    PaymentMethodResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        method_type:
          type: string
          enum:
          - Card
          - SepaDebit
        stripe_payment_method_id:
          type: string
        stripe_customer_id:
          type: string
        display_label:
          type: string
          example: Visa ****4242
        is_default:
          type: boolean
        is_active:
          type: boolean
        metadata:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_expired:
          type: boolean
          description: Calculé depuis expires_at
        is_usable:
          type: boolean
          description: is_active && !is_expired
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TicketResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        building_id:
          type: string
          format: uuid
        unit_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
        assigned_to:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum:
          - Plumbing
          - Electrical
          - Heating
          - Cleaning
          - Security
          - General
          - Emergency
        priority:
          type: string
          enum:
          - Low
          - Medium
          - High
          - Urgent
          - Critical
        status:
          type: string
          enum:
          - Open
          - InProgress
          - Resolved
          - Closed
          - Cancelled
        resolution_notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        notification_type:
          type: string
          enum:
