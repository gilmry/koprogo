              - category
              - priority
              properties:
                building_id:
                  type: string
                  format: uuid
                unit_id:
                  type: string
                  format: uuid
                  description: Optionnel — lot concerné
                title:
                  type: string
                  example: Fuite d'eau dans le hall
                description:
                  type: string
                  example: Fuite visible au plafond du hall d'entrée, eau stagnante
                category:
                  type: string
                  enum:
                  - Plumbing
                  - Electrical
                  - Heating
                  - Cleaning
                  - Security
                  - General
                  - Emergency
                priority:
                  type: string
                  enum:
                  - Low
                  - Medium
                  - High
                  - Urgent
                  - Critical
      responses:
        '201':
          description: Ticket créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          description: Données invalides
