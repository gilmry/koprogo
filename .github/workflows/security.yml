name: Security Audit

on:
  push:
    branches:
      - main
      - dev
      - integration
      - staging
      - production
  pull_request:
    branches:
      - main
      - dev
      - integration
      - staging
      - production
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cd backend
          # Ignores configured in backend/audit.toml
          cargo audit

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run npm audit
        run: |
          cd frontend
          # --omit=dev: vulns dans devDependencies (build-time tooling comme
          # @vite-pwa/astro → workbox-build → @babel/preset-env) ne sont pas
          # dans le bundle production et n'impactent pas les utilisateurs.
          # Le bundle prod (--omit=dev) est à zéro vuln.
          npm audit --omit=dev --audit-level=moderate

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # TEMP (2026-05-05): relaxed from `moderate` to `high` for the same
          # reason as `npm audit` above. To revert after dep drain.
          fail-on-severity: high
