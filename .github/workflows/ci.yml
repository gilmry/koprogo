name: CI Pipeline

on:
  push:
    branches: [ main, develop, "claude/**", "release/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  actions: write

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Rust formatting
        run: |
          cd backend
          cargo fmt --check

      - name: Run Clippy
        run: |
          cd backend
          cargo clippy --all-targets --all-features -- -D warnings

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: |
          cd backend
          cargo test --lib --all-features

  test-bdd:
    name: BDD Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koprogo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koprogo_test
        run: |
          cd backend
          sqlx migrate run

      - name: Run BDD tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koprogo_test
        run: |
          cd backend
          cargo test --test bdd --test bdd_governance --test bdd_financial --test bdd_operations --test bdd_community

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koprogo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koprogo_test
        run: |
          cd backend
          sqlx migrate run

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koprogo_test
        run: |
          cd backend
          cargo test --test e2e

  api-breaking-changes:
    name: API Breaking Change Detection (oasdiff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          path: pr

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Check for breaking API changes
        run: |
          # The live spec source is now docs/api/openapi.json (auto-exported
          # from the Rust utoipa ApiDoc). openapi.yaml remains as a
          # human-readable fallback during the migration period.
          BASE_SPEC="base/docs/api/openapi.json"
          PR_SPEC="pr/docs/api/openapi.json"
          [ -f "$BASE_SPEC" ] || BASE_SPEC="base/docs/api/openapi.yaml"
          [ -f "$PR_SPEC" ] || PR_SPEC="pr/docs/api/openapi.yaml"
          oasdiff breaking "$BASE_SPEC" "$PR_SPEC" \
            --fail-on ERR \
            --format text || {
            echo ""
            echo "❌ Breaking API changes detected!"
            echo "   If intentional, document the migration in the PR description."
            echo "   See: https://www.oasdiff.com/breaking-changes"
            exit 1
          }

      - name: Report non-breaking API changes
        if: always()
        run: |
          BASE_SPEC="base/docs/api/openapi.json"
          PR_SPEC="pr/docs/api/openapi.json"
          [ -f "$BASE_SPEC" ] || BASE_SPEC="base/docs/api/openapi.yaml"
          [ -f "$PR_SPEC" ] || PR_SPEC="pr/docs/api/openapi.yaml"
          echo "📋 API changelog (non-breaking):"
          oasdiff changelog "$BASE_SPEC" "$PR_SPEC" --format text || true

  contract-types:
    name: Contract Types Check (end-to-end anti-drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      # Gate 1: Rust → OpenAPI spec
      # The export_openapi binary prints the spec generated from the live
      # ApiDoc derive to stdout. The committed docs/api/openapi.json MUST
      # match exactly — otherwise a #[derive(ToSchema)] or #[utoipa::path]
      # was added/removed without running `make openapi-export`.
      - name: Export OpenAPI spec from Rust source
        run: |
          cd backend
          cargo run --bin export_openapi > /tmp/openapi.fresh.json

      - name: Verify committed openapi.json matches Rust source
        run: |
          diff -u docs/api/openapi.json /tmp/openapi.fresh.json || {
            echo ""
            echo "❌ docs/api/openapi.json is out of sync with the Rust source."
            echo "   A DTO, enum, or handler annotation changed without a spec refresh."
            echo "   Run locally:"
            echo "     make openapi-export"
            echo "     git add docs/api/openapi.json && git commit"
            exit 1
          }

      # Gate 2: OpenAPI spec → TypeScript types
      # The committed src/types/api.d.ts MUST be regenerated from the spec
      # whenever the spec changes. Any drift here means the lib/api/*.ts
      # re-exports could be referencing schemas that no longer exist.
      - name: Verify api.d.ts is regenerated from the fresh spec
        run: |
          cd frontend
          npm run types:generate
          git diff --exit-code src/types/api.d.ts || {
            echo ""
            echo "❌ src/types/api.d.ts is stale."
            echo "   Run locally:"
            echo "     cd frontend && npm run types:generate"
            echo "     git add src/types/api.d.ts && git commit"
            exit 1
          }

      # Gate 3: TypeScript types → Svelte components
      # With enums re-exported from api.d.ts, any component referencing a
      # variant that no longer exists in the Rust source will fail here.
      # This closes the loop — Rust is the single source of truth for every
      # enum value visible in the UI.
      - name: Run svelte-check (enforces frontend↔backend enum contract)
        run: |
          cd frontend
          npx svelte-check --threshold error

      # Gate 4: No hand-written enum re-introductions in lib/api/*.ts
      # A small-surface safety net: we allow a documented allowlist of
      # UI-only enums without backend counterpart (e.g. ResourceStatus in
      # bookings.ts), but any NEW `export enum` needs to be justified.
      - name: Guard against new hand-written enums in lib/api
        run: |
          cd frontend
          count=$(grep -lE "^export enum [A-Z]" src/lib/api/*.ts 2>/dev/null | wc -l)
          if [ "$count" -gt 4 ]; then
            echo ""
            echo "❌ Too many hand-written enums in frontend/src/lib/api (got $count, max 4)."
            echo "   Re-export from api.d.ts instead:"
            echo "     export type Foo = components[\"schemas\"][\"Foo\"];"
            echo "     export const Foo = { ... } satisfies Record<string, Foo>;"
            echo ""
            echo "   Files still declaring enums:"
            grep -lE "^export enum [A-Z]" src/lib/api/*.ts
            exit 1
          fi

  vitest:
    name: Frontend Unit Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run vitest
        run: |
          cd frontend
          npx vitest run --reporter=default

  frontend-check:
    name: Frontend Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: TypeScript check
        run: |
          cd frontend
          npm run build

      - name: Check formatting
        run: |
          cd frontend
          npx prettier --check .

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koprogo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build and start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koprogo_test
          JWT_SECRET: ci-test-jwt-secret-for-playwright-minimum-32-chars
          TOTP_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SERVER_HOST: 127.0.0.1
          SERVER_PORT: 8080
          UPLOAD_DIR: ./uploads
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          ENABLE_RATE_LIMITING: false
          LOGIN_RATE_LIMIT_MAX: 1000
          SMTP_ENABLED: false
          RUST_LOG: warn
        run: |
          cd backend
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run
          cargo build
          cargo run &
          # Wait for backend to be ready (health check instead of fixed sleep)
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start within 60s"
              exit 1
            fi
            sleep 5
          done

      - name: Start frontend dev server
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: |
          cd frontend
          node scripts/generate-config.js
          npx astro dev --port 3000 &
          # Wait for frontend to be ready
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Frontend failed to start within 30s"
              exit 1
            fi
            sleep 2
          done

      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_BASE: http://localhost:8080/api/v1
        run: |
          cd frontend
          npx playwright test --project=chromium

      - name: Seed scenario world for Documentation Vivante
        env:
          PLAYWRIGHT_API_BASE: http://localhost:8080/api/v1
        run: |
          # Login admin and seed the world for scenario tests
          TOKEN=$(curl -s http://localhost:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@koprogo.com","password":"admin123"}' \
            | jq -r '.token')
          curl -s -X POST http://localhost:8080/api/v1/seed/scenario/world \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' || echo "Seed already exists or failed"

      - name: Run Documentation Vivante scenarios (video generation)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_BASE: http://localhost:8080/api/v1
        run: |
          cd frontend
          npx playwright test --project=scenarios || echo "Some scenarios failed (non-blocking for CI)"

      - name: Cleanup scenario world
        if: always()
        run: |
          TOKEN=$(curl -s http://localhost:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@koprogo.com","password":"admin123"}' \
            | jq -r '.token') || true
          curl -s -X DELETE http://localhost:8080/api/v1/seed/scenario/world \
            -H "Authorization: Bearer $TOKEN" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-bdd, test-e2e, frontend-check, contract-types, vitest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: backend/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          cd backend
          cargo build --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: koprogo-api
          path: backend/target/release/koprogo-api
          retention-days: 7
