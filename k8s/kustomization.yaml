---
# Kustomize Configuration for KoproGo K8s Manifests
# Issue #266-#268: K3s + ArgoCD GitOps
# Belgian GDPR compliance, EU datacenter

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: koprogo

# All Kubernetes manifests
resources:
- namespace.yaml
- backend-serviceaccount.yaml
- frontend-serviceaccount.yaml
- backend-deployment.yaml
- backend-service.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- ingress.yaml

# Container image tag replacement
images:
- name: ghcr.io/gilmry/koprogo-backend
  newName: ghcr.io/gilmry/koprogo-backend
  newTag: latest
- name: ghcr.io/gilmry/koprogo-frontend
  newName: ghcr.io/gilmry/koprogo-frontend
  newTag: latest

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: koprogo
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/component: platform
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: koprogo
  environment: production
  gdpr-compliant: "true"
  region: eu-west

# Strategic merge patch for Deployments
replicas:
- name: koprogo-backend
  count: 2
- name: koprogo-frontend
  count: 2
