---
# KoproGo Backend Service Account
# Issue #266-#268: K3s + ArgoCD GitOps
# RBAC: Minimal permissions for backend pod

apiVersion: v1
kind: ServiceAccount
metadata:
  name: koprogo-backend
  namespace: koprogo
  labels:
    app: koprogo-backend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: koprogo-backend
  namespace: koprogo
rules:
# Allow reading ConfigMaps and Secrets (read-only)
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get"]
  resourceNames: ["koprogo-secrets"]
# Allow reading own pod status
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
  resourceNames: []

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: koprogo-backend
  namespace: koprogo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: koprogo-backend
subjects:
- kind: ServiceAccount
  name: koprogo-backend
  namespace: koprogo
