---
# KoproGo Backend Service
# Issue #266-#268: K3s + ArgoCD GitOps
# ClusterIP service for internal API routing

apiVersion: v1
kind: Service
metadata:
  name: koprogo-backend
  namespace: koprogo
  labels:
    app: koprogo-backend
    component: api
  annotations:
    description: "KoproGo API backend service"

spec:
  type: ClusterIP
  selector:
    app: koprogo-backend

  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http

  sessionAffinity: None
