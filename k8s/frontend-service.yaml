---
# KoproGo Frontend Service
# Issue #266-#268: K3s + ArgoCD GitOps
# ClusterIP service for frontend routing

apiVersion: v1
kind: Service
metadata:
  name: koprogo-frontend
  namespace: koprogo
  labels:
    app: koprogo-frontend
    component: ui
  annotations:
    description: "KoproGo frontend service"

spec:
  type: ClusterIP
  selector:
    app: koprogo-frontend

  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http

  sessionAffinity: None
